name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26.3'
        cache: true

    - name: Verify Go version
      run: |
        go version
        go env

    - name: Run CI checks
      run: make ci

    - name: Upload coverage to Codecov (optional)
      if: success()
      run: |
        bash <(curl -s https://codecov.io/bash) || echo "Codecov upload failed, continuing..."