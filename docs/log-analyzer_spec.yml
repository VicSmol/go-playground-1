# Log Analyzer CLI Specification
# Version: 1.0.0
# Specification Format: YAML
# Target: Go CLI Tool

metadata:
  name: log-analyzer
  version: 1.0.0
  description: CLI tool for analyzing log files with support for multiple formats
  language: go
  spec_version: 1.0
  created_at: 2026-06-08
  status: draft

# =============================================================================
# INPUT SPECIFICATIONS
# =============================================================================

input:
  sources:
    - name: file
      description: Path to log file as positional argument
      type: string
      required: false
      default: null
      behavior: |
        - If specified: read from the file
        - If not specified: read from stdin (pipe)
        - Multiple files are not supported
    
    - name: stdin
      description: Standard input stream
      type: stream
      required: false
      default: null
      behavior: |
        - Used when no file argument is provided
        - Read line by line using bufio.Scanner

  formats:
    - name: json
      description: JSON format with structured log entries
      detection:
        pattern: ^\s*\{
        precedence: 1
      structure:
        required_fields:
          - level: string (required)
          - component: string (required)
          - message: string (optional)
          - timestamp: string (optional)
        example: |
          {"level":"INFO","component":"auth","message":"User logged in","timestamp":"2026-06-08T10:00:00Z"}
      parser:
        package: pkg/log-analyzer/parser
        file: json_parser.go
        interface: LogParser
        returns: LogEntry
        errors:
          - invalid_json: skip line
          - missing_required_field: skip line

    - name: syslog
      description: Syslog format (RFC 3164)
      detection:
        pattern: ^(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d+\s+\d+:\d+:\d+
        precedence: 2
      structure:
        required_fields:
          - month: string
          - day: string
          - time: string
          - host: string
          - component: string
          - pid: string (optional)
          - level: string
          - message: string
        example: |
          Jun  8 10:00:00 host nginx[123]: [INFO] User logged in
      parser:
        package: pkg/log-analyzer/parser
        file: syslog_parser.go
        interface: LogParser
        returns: LogEntry
        errors:
          - parsing_failed: skip line
          - invalid_date: skip line

    - name: custom
      description: Custom format: LEVEL COMPONENT: message
      detection:
        pattern: ^(DEBUG|INFO|WARN|WARNING|ERROR|FATAL|CRITICAL|EMERGENCY)\s+\S+:.*$
        precedence: 3
      structure:
        required_fields:
          - level: string (first word)
          - component: string (second word, before ':')
          - message: string (after ':')
        example: |
          INFO auth: User logged in
      parser:
        package: pkg/log-analyzer/parser
        file: custom_parser.go
        interface: LogParser
        returns: LogEntry
        errors:
          - malformed_format: skip line
          - missing_colon: skip line

  log_levels:
    - name: DEBUG
      aliases: []
      normalized: DEBUG
      description: Debug level for detailed diagnostic information

    - name: INFO
      aliases: []
      normalized: INFO
      description: Information level for general operational messages

    - name: WARN
      aliases:
        - WARNING
      normalized: WARN
      description: Warning level for potentially problematic situations

    - name: ERROR
      aliases: []
      normalized: ERROR
      description: Error level for error events that might still allow the application to continue

    - name: FATAL
      aliases:
        - CRITICAL
        - EMERGENCY
      normalized: FATAL
      description: Fatal level for very severe error events that will presumably lead the application to abort

# =============================================================================
# AGGREGATION LOGIC
# =============================================================================

aggregation:
  key:
    format: level:component
    separator: ":"
    description: Combined key of normalized log level and component name
    
  value:
    type: integer
    description: Count of occurrences for each level:component combination

  operations:
    - name: add
      description: Increment count for a level:component key
      implementation: Aggregator.Add(level, component)
      package: pkg/log-analyzer/aggregator

    - name: get_stats
      description: Retrieve all aggregated statistics
      implementation: Aggregator.GetStats()
      package: pkg/log-analyzer/aggregator
      returns:
        type: []LogEntry
        description: Slice of LogEntry structs

# =============================================================================
# SORTING & LIMITING
# =============================================================================

sorting:
  default_order: desc
  supported_orders:
    - name: desc
      description: Descending order (highest count first)
      implementation: sort by count descending
    - name: asc
      description: Ascending order (lowest count first)
      implementation: sort by count ascending

  field: count
  type: numeric
  stable: true

limiting:
  flag: --top
  default: 5
  min: 1
  max: null
  description: Limit the number of results in output

# =============================================================================
# OUTPUT SPECIFICATIONS
# =============================================================================

output:
  formats:
    - name: table
      description: Human-readable ASCII table
      default: true
      extension: null
      structure:
        header:
          - level
          - component
          - count
        alignment:
          level: center
          component: center
          count: right
        separator: "|"
        border: "+"
        example: |
          +------------+------------------+-------+
          |   LEVEL    |   COMPONENT      | COUNT |
          +------------+------------------+-------+
          | INFO       | auth             |    42 |
          | ERROR      | db               |    17 |
          | WARN       | cache            |    13 |
          +------------+------------------+-------+
      formatter:
        package: pkg/log-analyzer/output
        file: table_formatter.go
        interface: Formatter

    - name: json
      description: Structured JSON format
      default: false
      extension: .json
      structure:
        type: array
        items:
          type: object
          properties:
            level: string
            component: string
            count: integer
        example: |
          [
            {
              "level": "INFO",
              "component": "auth",
              "count": 42
            },
            {
              "level": "ERROR",
              "component": "db",
              "count": 17
            }
          ]
      formatter:
        package: pkg/log-analyzer/output
        file: json_formatter.go
        interface: Formatter

    - name: csv
      description: CSV format
      default: false
      extension: .csv
      structure:
        header: level,component,count
        delimiter: ","
        example: |
          level,component,count
          INFO,auth,42
          ERROR,db,17
      formatter:
        package: pkg/log-analyzer/output
        file: csv_formatter.go
        interface: Formatter

# =============================================================================
# CLI FLAGS AND ARGUMENTS
# =============================================================================

cli:
  positional_arguments:
    - name: FILE
      description: Path to log file (optional, defaults to stdin)
      type: string
      required: false
      default: null
      examples:
        - "/var/log/app.log"
        - "logs/application.log"

  flags:
    - name: --top
      type: int
      default: 5
      description: Number of top results to display
      short: null
      examples:
        - "--top 10"
        - "--top 1"
      validation:
        min: 1
        max: null

    - name: --order
      type: string
      default: "desc"
      description: Sort order for results
      values:
        - "asc"
        - "desc"
      short: null
      examples:
        - "--order asc"
        - "--order desc"

    - name: --output
      type: string
      default: "table"
      description: Output format
      values:
        - "table"
        - "json"
        - "csv"
      short: null
      examples:
        - "--output json"
        - "--output csv"
        - "--output table"

    - name: --help
      type: bool
      default: false
      description: Display help information
      short: h
      examples:
        - "--help"

    - name: --version
      type: bool
      default: false
      description: Display version information
      short: v
      examples:
        - "--version"

  usage_examples:
    - command: log-analyzer /var/log/app.log
      description: Analyze file with default settings (top 5, descending, table format)
    
    - command: log-analyzer --top 10 --order asc /var/log/app.log
      description: Analyze file with top 10 results, ascending order
    
    - command: cat app.log | log-analyzer --output json
      description: Analyze stdin output in JSON format
    
    - command: log-analyzer --top 3 --output csv /var/log/app.log
      description: Analyze file with top 3 results in CSV format

# =============================================================================
# ERROR HANDLING
# =============================================================================

error_handling:
  file_errors:
    - error: file_not_found
      behavior: |
        - Print error message to stderr
        - Exit with code 1
      message_format: "Error: file not found: {filename}"
    
    - error: permission_denied
      behavior: |
        - Print error message to stderr
        - Exit with code 1
      message_format: "Error: permission denied: {filename}"
    
    - error: file_empty
      behavior: |
        - Print no error message
        - Exit with code 0
        - Output empty result
      message_format: null

  parsing_errors:
    - error: malformed_line
      behavior: |
        - Skip the line
        - Continue processing
        - Do not print error
      message_format: null
    
    - error: invalid_json
      behavior: |
        - Skip the line
        - Continue processing
        - Do not print error
      message_format: null
    
    - error: parsing_failed
      behavior: |
        - Skip the line
        - Continue processing
        - Do not print error
      message_format: null

  exit_codes:
    - code: 0
      description: Success (even if some lines were skipped)
    
    - code: 1
      description: Input/output error (file not found, permission denied, etc.)

# =============================================================================
# ARCHITECTURE
# =============================================================================

architecture:
  package_structure:
    - name: cmd
      description: Entry points for the application
      files:
        - name: main.go
          description: Main CLI entry point, registers subcommands
          responsibilities:
            - Initialize CLI
            - Register commands
            - Parse flags
            - Execute commands
    
    - name: pkg/log-analyzer
      description: Core business logic
      subpackages:
        - name: parser
          description: Log parsing implementations
          files:
            - name: parser.go
              description: LogParser interface definition
              interfaces:
                - name: LogParser
                  methods:
                    - name: Parse
                      signature: "(line string) (*LogEntry, error)"
                      description: Parse a single log line
            - name: json_parser.go
              description: JSON format parser
              implements: LogParser
            - name: syslog_parser.go
              description: Syslog (RFC 3164) format parser
              implements: LogParser
            - name: custom_parser.go
              description: Custom format parser (LEVEL COMPONENT: message)
              implements: LogParser
          responsibilities:
            - Detect log format automatically
            - Parse log lines into LogEntry structs
            - Handle format-specific parsing errors
        
        - name: aggregator
          description: Log aggregation logic
          files:
            - name: aggregator.go
              description: Aggregator interface and implementation
              interfaces:
                - name: Aggregator
                  methods:
                    - name: Add
                      signature: "(level, component string)"
                      description: Add a log entry to aggregation
                    - name: GetStats
                      signature: "() []LogEntry"
                      description: Get aggregated statistics
              implementations:
                - name: StatsAggregator
                  description: Default aggregator implementation using map
            - name: stats.go
              description: Data structures for aggregated data
              types:
                - name: LogEntry
                  fields:
                    - name: Level
                      type: string
                      description: Normalized log level
                    - name: Component
                      type: string
                      description: Component name
                    - name: Count
                      type: int
                      description: Number of occurrences
            responsibilities:
              - Aggregate log entries by level:component
              - Sort results
              - Limit results
        
        - name: output
          description: Output formatting
          files:
            - name: formatter.go
              description: Formatter interface definition
              interfaces:
                - name: Formatter
                  methods:
                    - name: Format
                      signature: "(entries []LogEntry) (string, error)"
                      description: Format log entries for output
            - name: table_formatter.go
              description: Table formatter (ASCII)
              implements: Formatter
            - name: json_formatter.go
              description: JSON formatter
              implements: Formatter
            - name: csv_formatter.go
              description: CSV formatter
              implements: Formatter
          responsibilities:
            - Format aggregated data for display
            - Handle format-specific options

    - name: internal/log-analyzer
      description: Internal utilities (not for external use)
      files:
        - name: version.go
          description: Version information for the CLI
          contents: |
            package internal

            const (
                Version = "1.0.0"
            )
      responsibilities:
        - Version management
        - Shared utilities (if needed)

  dependencies:
    - name: cobra
      description: CLI framework for command handling
      required: optional
      version: latest
      usage: |
        - Used for subcommand handling
        - Used for flag parsing
        - Used for help and version commands

    - name: standard library
      description: Go standard library packages
      required: true
      packages:
        - bufio: Scanner for streaming
        - encoding/json: JSON parsing
        - flag: Flag parsing
        - fmt: Formatting
        - os: File I/O
        - sort: Sorting
        - strings: String manipulation

# =============================================================================
# DATA STRUCTURES
# =============================================================================

data_structures:
  - name: LogEntry
    description: Single parsed log entry
    package: pkg/log-analyzer/aggregator
    fields:
      - name: Level
        type: string
        required: true
        description: Normalized log level (DEBUG, INFO, WARN, ERROR, FATAL)
        validation:
          allowed_values:
            - DEBUG
            - INFO
            - WARN
            - ERROR
            - FATAL
      - name: Component
        type: string
        required: true
        description: Component name that generated the log
        validation:
          min_length: 1
      - name: Count
        type: int
        required: true
        description: Number of occurrences
        validation:
          min: 1

  - name: Aggregator
    description: Aggregation engine for log entries
    package: pkg/log-analyzer/aggregator
    fields:
      - name: stats
        type: map[string]int
        description: Map of level:component keys to counts
        visibility: private
    methods:
      - name: Add
        signature: "(level, component string)"
        description: Add a log entry to aggregation
        parameters:
          - name: level
            type: string
            description: Normalized log level
          - name: component
            type: string
            description: Component name
        returns:
          - type: void
      - name: GetStats
        signature: "() []LogEntry"
        description: Get aggregated statistics
        returns:
          - type: []LogEntry
            description: Slice of LogEntry structs sorted by count

  - name: LogParser
    description: Interface for log parsers
    package: pkg/log-analyzer/parser
    methods:
      - name: Parse
        signature: "(line string) (*LogEntry, error)"
        description: Parse a single log line
        parameters:
          - name: line
            type: string
            description: Raw log line to parse
        returns:
          - type: *LogEntry
            description: Parsed log entry
          - type: error
            description: Error if parsing failed
    implementations:
      - name: JSONParser
        package: pkg/log-analyzer/parser
      - name: SyslogParser
        package: pkg/log-analyzer/parser
      - name: CustomParser
        package: pkg/log-analyzer/parser

  - name: Formatter
    description: Interface for output formatters
    package: pkg/log-analyzer/output
    methods:
      - name: Format
        signature: "(entries []LogEntry) (string, error)"
        description: Format log entries for output
        parameters:
          - name: entries
            type: []LogEntry
            description: Aggregated log entries to format
        returns:
          - type: string
            description: Formatted output string
          - type: error
            description: Error if formatting failed
    implementations:
      - name: TableFormatter
        package: pkg/log-analyzer/output
      - name: JSONFormatter
        package: pkg/log-analyzer/output
      - name: CSVFormatter
        package: pkg/log-analyzer/output

# =============================================================================
# TESTING REQUIREMENTS
# =============================================================================

testing:
  unit_tests:
    required: true
    coverage_target: 80
    packages:
      - name: pkg/log-analyzer/parser
        test_files:
          - name: json_parser_test.go
            test_cases:
              - name: parse_valid_json
                description: Parse a valid JSON log entry
                input: '{"level":"INFO","component":"auth","message":"User logged in"}'
                expected:
                  level: INFO
                  component: auth
                  error: null
              - name: parse_invalid_json
                description: Handle invalid JSON gracefully
                input: 'not valid json'
                expected:
                  level: null
                  component: null
                  error: not nil
              - name: parse_missing_level
                description: Handle JSON with missing level field
                input: '{"component":"auth","message":"User logged in"}'
                expected:
                  level: null
                  component: null
                  error: not nil
              - name: parse_missing_component
                description: Handle JSON with missing component field
                input: '{"level":"INFO","message":"User logged in"}'
                expected:
                  level: null
                  component: null
                  error: not nil
              - name: parse_case_insensitive_level
                description: Handle case-insensitive log levels
                input: '{"level":"info","component":"auth","message":"User logged in"}'
                expected:
                  level: INFO
                  component: auth
                  error: null
          - name: syslog_parser_test.go
            test_cases:
              - name: parse_valid_syslog
                description: Parse a valid syslog entry
                input: 'Jun  8 10:00:00 host nginx[123]: [INFO] User logged in'
                expected:
                  level: INFO
                  component: nginx
                  error: null
              - name: parse_invalid_syslog
                description: Handle invalid syslog format
                input: 'not a syslog line'
                expected:
                  level: null
                  component: null
                  error: not nil
              - name: parse_syslog_without_pid
                description: Parse syslog without process ID
                input: 'Jun  8 10:00:00 host nginx: [INFO] User logged in'
                expected:
                  level: INFO
                  component: nginx
                  error: null
          - name: custom_parser_test.go
            test_cases:
              - name: parse_valid_custom
                description: Parse a valid custom format log
                input: 'INFO auth: User logged in'
                expected:
                  level: INFO
                  component: auth
                  error: null
              - name: parse_invalid_custom
                description: Handle invalid custom format
                input: 'not a custom line'
                expected:
                  level: null
                  component: null
                  error: not nil
              - name: parse_with_colon_in_message
                description: Parse custom format with colon in message
                input: 'INFO auth: User: admin logged in'
                expected:
                  level: INFO
                  component: auth
                  error: null
        test_requirements:
          - Test all supported log formats
          - Test error handling (malformed input)
          - Test edge cases (empty strings, special characters)
          - Test case-insensitive log levels
          - Test level normalization (WARNING→WARN, etc.)

      - name: pkg/log-analyzer/aggregator
        test_files:
          - name: aggregator_test.go
            test_cases:
              - name: add_single_entry
                description: Add a single log entry
                input:
                  level: INFO
                  component: auth
                expected:
                  count: 1
              - name: add_duplicate_entries
                description: Add duplicate entries (should increment count)
                input:
                  - level: INFO, component: auth
                  - level: INFO, component: auth
                  - level: INFO, component: auth
                expected:
                  count: 3
              - name: get_stats_sorted_desc
                description: Get stats sorted by count descending
                input:
                  - level: INFO, component: auth, count: 5
                  - level: ERROR, component: db, count: 10
                  - level: WARN, component: cache, count: 3
                expected:
                  order: desc
                  order: [ERROR:db, INFO:auth, WARN:cache]
              - name: get_stats_sorted_asc
                description: Get stats sorted by count ascending
                input:
                  - level: INFO, component: auth, count: 5
                  - level: ERROR, component: db, count: 10
                  - level: WARN, component: cache, count: 3
                expected:
                  order: asc
                  order: [WARN:cache, INFO:auth, ERROR:db]
              - name: normalize_levels
                description: Test level normalization
                input:
                  - level: WARNING, component: auth
                  - level: WARN, component: auth
                  - level: CRITICAL, component: db
                  - level: FATAL, component: db
                expected:
                  - level: WARN, component: auth, count: 2
                  - level: FATAL, component: db, count: 2
        test_requirements:
          - Test aggregation logic
          - Test sorting (asc/desc)
          - Test level normalization
          - Test limit functionality

      - name: pkg/log-analyzer/output
        test_files:
          - name: table_formatter_test.go
            test_cases:
              - name: format_empty
                description: Format empty stats
                input: []
                expected: table with header only
              - name: format_single_entry
                description: Format a single entry
                input:
                  - level: INFO, component: auth, count: 5
                expected: proper table with one data row
              - name: format_multiple_entries
                description: Format multiple entries
                input:
                  - level: INFO, component: auth, count: 5
                  - level: ERROR, component: db, count: 3
                expected: proper table with two data rows
          - name: json_formatter_test.go
            test_cases:
              - name: format_empty
                description: Format empty stats
                input: []
                expected: "[]"
              - name: format_single_entry
                description: Format a single entry
                input:
                  - level: INFO, component: auth, count: 5
                expected: JSON array with one object
              - name: format_valid_json
                description: Validate JSON output
                input:
                  - level: INFO, component: auth, count: 5
                expected:
                  valid_json: true
                  structure:
                    - level: "INFO"
                    - component: "auth"
                    - count: 5
          - name: csv_formatter_test.go
            test_cases:
              - name: format_empty
                description: Format empty stats
                input: []
                expected: header only
              - name: format_single_entry
                description: Format a single entry
                input:
                  - level: INFO, component: auth, count: 5
                expected: header + one data row
              - name: format_multiple_entries
                description: Format multiple entries
                input:
                  - level: INFO, component: auth, count: 5
                  - level: ERROR, component: db, count: 3
                expected: header + two data rows
        test_requirements:
          - Test all output formats
          - Test empty input handling
          - Test single and multiple entry formatting
          - Test JSON validity
          - Test CSV structure

  integration_tests:
    required: true
    test_scenarios:
      - name: file_input
        description: Test file input functionality
        command: log-analyzer testdata/sample.log
        expected:
          exit_code: 0
          output_format: table (default)
          result_count: 5 (default)
      - name: stdin_input
        description: Test stdin input functionality
        command: cat testdata/sample.log | log-analyzer
        expected:
          exit_code: 0
          output_format: table (default)
          result_count: 5 (default)
      - name: all_flags_combination
        description: Test all flags combined
        command: log-analyzer --top 10 --order asc --output json testdata/sample.log
        expected:
          exit_code: 0
          output_format: json
          result_count: <= 10
          order: ascending
      - name: error_file_not_found
        description: Test error handling for missing file
        command: log-analyzer nonexistent.log
        expected:
          exit_code: 1
          stderr_contains: "file not found"
      - name: empty_file
        description: Test empty file handling
        command: log-analyzer testdata/empty.log
        expected:
          exit_code: 0
          output: empty
      - name: malformed_lines
        description: Test handling of malformed lines
        command: log-analyzer testdata/mixed.log
        expected:
          exit_code: 0
          output: only valid parsed entries
          skipped_lines: silently ignored

  test_data:
    required: true
    directory: testdata
    files:
      - name: json.log
        description: Sample JSON format logs
        content: |
          {"level":"INFO","component":"auth","message":"User logged in"}
          {"level":"ERROR","component":"db","message":"Connection refused"}
          {"level":"INFO","component":"auth","message":"User logged out"}
          {"level":"WARN","component":"cache","message":"Cache miss"}
          {"level":"INFO","component":"auth","message":"User logged in"}
      
      - name: syslog.log
        description: Sample syslog format logs
        content: |
          Jun  8 10:00:00 host nginx[123]: [INFO] User logged in
          Jun  8 10:00:01 host nginx[123]: [ERROR] Connection refused
          Jun  8 10:00:02 host auth[456]: [INFO] User logged out
          Jun  8 10:00:03 host cache[789]: [WARN] Cache miss
      
      - name: custom.log
        description: Sample custom format logs
        content: |
          INFO auth: User logged in
          ERROR db: Connection refused
          INFO auth: User logged out
          WARN cache: Cache miss
      
      - name: mixed.log
        description: Mixed format logs
        content: |
          {"level":"INFO","component":"auth","message":"JSON entry"}
          Jun  8 10:00:00 host nginx: [INFO] Syslog entry
          INFO custom: Custom format entry
      
      - name: malformed.log
        description: Malformed entries
        content: |
          not a valid log line
          {"invalid": true}
          random garbage here
          INFO
          ERROR
      
      - name: empty.log
        description: Empty file
        content: ""

# =============================================================================
# ACCEPTANCE CRITERIA
# =============================================================================

acceptance_criteria:
  functional:
    - criterion: CLI reads file input
      test: log-analyzer /path/to/file.log
      pass: true
      description: CLI successfully reads and parses log files
    
    - criterion: CLI reads stdin input
      test: cat file.log | log-analyzer
      pass: true
      description: CLI successfully reads from stdin
    
    - criterion: Automatic format detection
      test: CLI accepts mixed format logs
      pass: true
      description: CLI automatically detects and handles multiple log formats
    
    - criterion: JSON format parsing
      test: CLI parses JSON format logs
      pass: true
      description: JSON logs are correctly parsed with level and component
    
    - criterion: Syslog format parsing
      test: CLI parses syslog format logs
      pass: true
      description: Syslog logs are correctly parsed with level and component
    
    - criterion: Custom format parsing
      test: CLI parses custom format logs
      pass: true
      description: Custom logs (LEVEL COMPONENT: message) are correctly parsed
    
    - criterion: Level normalization
      test: WARNING and WARN both normalize to WARN
      pass: true
      description: Log levels are correctly normalized as per specification
    
    - criterion: Aggregation by level:component
      test: Count correct for each level:component combination
      pass: true
      description: Entries are correctly aggregated by level:component key
    
    - criterion: Sort by count (desc default)
      test: Results sorted by count descending by default
      pass: true
      description: Results are sorted by count in descending order by default
    
    - criterion: Sort by count (asc option)
      test: Results sorted by count ascending with --order asc
      pass: true
      description: Results are sorted by count in ascending order with --order asc
    
    - criterion: Top-N limiting
      test: --top N limits output to N results
      pass: true
      description: Output is correctly limited to top N results
    
    - criterion: Table output format
      test: --output table produces ASCII table
      pass: true
      description: Table format is correctly generated with borders and alignment
    
    - criterion: JSON output format
      test: --output json produces valid JSON
      pass: true
      description: JSON format is correctly generated and valid
    
    - criterion: CSV output format
      test: --output csv produces valid CSV
      pass: true
      description: CSV format is correctly generated with header row
    
    - criterion: --help flag
      test: log-analyzer --help shows usage
      pass: true
      description: Help information is displayed correctly
    
    - criterion: --version flag
      test: log-analyzer --version shows version
      pass: true
      description: Version information is displayed correctly

  error_handling:
    - criterion: File not found error
      test: log-analyzer nonexistent.log
      pass: exit_code == 1
      description: CLI exits with code 1 for missing files
    
    - criterion: Permission denied error
      test: log-analyzer /root/protected.log (no permission)
      pass: exit_code == 1
      description: CLI exits with code 1 for permission errors
    
    - criterion: Malformed line handling
      test: CLI processes file with malformed lines
      pass: exit_code == 0
      description: Malformed lines are skipped without errors
    
    - criterion: Empty file handling
      test: log-analyzer empty.log
      pass: exit_code == 0, output empty
      description: Empty files are handled gracefully

  quality:
    - criterion: Unit test coverage
      test: go test ./... -cover
      pass: coverage >= 80%
      description: Code has sufficient unit test coverage
    
    - criterion: No external dependencies (except cobra)
      test: go mod graph
      pass: only stdlib + cobra
      description: CLI uses only required external dependencies
    
    - criterion: Streaming processing
      test: Large file processing
      pass: Memory usage stable
      description: CLI processes large files efficiently without loading all into memory

  documentation:
    - criterion: README.md exists
      test: Check README.md
      pass: true
      description: README file exists with usage examples
    
    - criterion: docs/log-analyzer.md exists
      test: Check docs/log-analyzer.md
      pass: true
      description: Technical specification exists
    
    - criterion: docs/log-analyzer_spec.yml exists
      test: Check docs/log-analyzer_spec.yml
      pass: true
      description: YAML specification exists

# =============================================================================
# PERFORMANCE REQUIREMENTS
# =============================================================================

performance:
  streaming:
    required: true
    method: bufio.Scanner
    description: Use streaming to process large files without loading all into memory
    
  memory:
    max_per_entry: ~100 bytes
    total_memory: O(unique_level_component_pairs)
    description: Memory usage should scale with unique combinations, not total lines
    
  throughput:
    target_lines_per_second: 10000
    description: Target processing speed for typical workloads
    
  latency:
    first_result_ms: 100
    description: First results should be available quickly for user feedback
